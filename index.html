<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speech Pattern Drill</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <h1>Speech Pattern Drill</h1>

    <section class="panel">
      <h2>상태</h2>
      <p id="status">Idle - say: start, backward, have a go, next, reset</p>
    </section>

    <section class="panel">
      <h2>타겟 표현</h2>
      <p id="targetText">Just tell me what you're told.</p>
    </section>

    <section class="panel">
      <h2>인식 결과</h2>
      <p id="transcript">Your speech recognition result will appear here.</p>
    </section>

    <section class="panel counter-panel">
      <h2>카운트</h2>
      <p id="countValue">0</p>
    </section>

    <section class="controls">
      <button id="listenButton">Start Listening</button>
      <button id="speakButton">Speak Target</button>
      <button id="backwardButton">Backward</button>
      <button id="practiceButton">Have a Go</button>
      <button id="resetButton">Reset</button>   
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
